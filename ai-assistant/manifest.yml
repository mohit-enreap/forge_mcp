modules:
  confluence:globalPage:
    - key: ai-assistant-hello-world
      resource: main
      resolver:
        function: resolver
      title: ai-assistant
      route: hello-world

  jira:globalPage:
    - key: ai-assistant-jira-global
      resource: main
      resolver:
        function: resolver
      title: ai-assistant
      route: hello-world

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/hello-world/build

app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/4b0a6644-7f48-407e-b539-d9becc60ec6f

permissions:
  scopes:
    - read:space:confluence
    - storage:app
    - read:confluence-content.all
    - write:confluence-content
    - read:confluence-space.summary
    - search:confluence
    - read:jira-work
    - write:jira-work
    - read:jira-user
  external:
    fetch:
      backend:
        - address: https://api.groq.com
        - address: https://*.atlassian.net
